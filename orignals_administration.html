<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Admin page for originals shop" />
    <meta name="author" content="JFKD Developments" />
    <title>RaphaellaFkdArt Originals</title>
    <link rel="icon" href="img/raphaella-logo.JPEG" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/originals_admin.css" />
    <link rel="stylesheet" href="css/originals.css" />
    <script defer src="js/orignal_admin.js"></script>
  </head>
  <body>
    <div class="admin_popup_container">
      <article class="delete_ensuring">
        <header>
          <h3>Aynamawa</h3>
          <div class="styler"></div>
          <span class="disclaimer"
            >Are you sure you want to remove
            <span class="remove_item_name">Aynamawa</span> from your shop?</span
          >
        </header>
        <ul>
          <li>No</li>
          <li>Yes</li>
        </ul>
      </article>
    </div>
    <header id="admin_head">
      <h1>
        <div class="admin_logo">
          <img width="90px" src="img/raphaella-logo.JPEG" alt="company_logo" />
          <img
            width="115px"
            src="img/raphaella-logo_extension.PNG"
            alt="logo extension"
          />
        </div>
      </h1>
      <section class="title">
        Original Shop Administration
        <div class="styler"></div>
      </section>
      <section class="nav">
        <div class="nav_inner">
          <a href="">Add Item</a>
          <div class="styler"></div>
        </div>
      </section>
    </header>
    <main id="shop_items"></main>
  </body>
</html>
