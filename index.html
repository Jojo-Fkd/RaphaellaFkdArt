<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Landing page where artist's works are displayed"
    />
    <meta property="title" content="Gallery - Raphaella Fkd Art" />
    <meta name="author" content="JFKD" />
    <title>Gallery - Raphaella Fkd Art</title>
    <link rel="icon" href="img/raphaella-logo.JPEG" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/gallery.css" />
    <script defer src="js/main.js"></script>
    <script defer src="js/gallery.js"></script>
  </head>
  <body>
    <nav id="navigation">
      <h1 class="logo">
        <a href="index.html" aria-label="link to gallery"
          ><img width="90px" src="img/raphaella-logo.JPEG" alt="company_logo" />
          <img
            width="115px"
            src="img/raphaella-logo_extension.PNG"
            alt="logo extension"
          />
        </a>
      </h1>
      <ul class="nav-elements">
        <li class="page">
          <a href="index.html" aria-label="link to gallery">Gallery</a>
          <div class="indicator"></div>
        </li>
        <li>
          <a href="shop.html" aria-label="link to shop">Shop</a>
          <div class="indicator"></div>
        </li>
        <li>
          <a href="about.html" aria-label="link to about page">About</a>
          <div class="indicator"></div>
        </li>
        <li>
          <a href="contact.html">Contact</a>
          <div class="indicator"></div>
        </li>
        <li class="cart-li">
          <a
            class="cart_icon"
            href="cart.html"
            aria-label="link to shopping cart"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="1.5rem"
              viewBox="0 0 576 512"
            >
              <path
                d="M0 24C0 10.7 10.7 0 24 0H69.5c22 0 41.5 12.8 50.6 32h411c26.3 0 45.5 25 38.6 50.4l-41 152.3c-8.5 31.4-37 53.3-69.5 53.3H170.7l5.4 28.5c2.2 11.3 12.1 19.5 23.6 19.5H488c13.3 0 24 10.7 24 24s-10.7 24-24 24H199.7c-34.6 0-64.3-24.6-70.7-58.5L77.4 54.5c-.7-3.8-4-6.5-7.9-6.5H24C10.7 48 0 37.3 0 24zM128 464a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm336-48a48 48 0 1 1 0 96 48 48 0 1 1 0-96z"
              />
            </svg>
            <sub class="cart_amount"></sub>
            <div class="indicator"></div>
          </a>
        </li>
        <li class="drop-icon">
          <span></span>
        </li>
      </ul>
    </nav>
    <ul class="side-bar-elements">
      <li>
        <a href="index.html" aria-label="link to gallery">Gallery</a>
        <div class="indicator"></div>
      </li>
      <li>
        <a href="shop.html" aria-label="link to shop">Shop</a>
        <div class="indicator"></div>
      </li>
      <li>
        <a href="about.html" aria-label="link to about page">About</a>
        <div class="indicator"></div>
      </li>
      <li>
        <a href="contact.html">Contact</a>
        <div class="indicator"></div>
      </li>
    </ul>
    <div class="popup_container">
      <!-- FOOTER SIGN UP POPUPS -->
      <section class="shopping-option_popup success_popup_footer">
        <header>
          <h3>Successful</h3>
          <div class="styler"></div>
        </header>
        <p>You'll recieve notifications to your email inbox.</p>
      </section>
      <section class="shopping-option_popup failed_popup_footer">
        <header>
          <h3>Failed</h3>
          <div class="styler"></div>
        </header>
        <p>Try Again.</p>
      </section>
      <!-- EMAIL SENDING... -->
      <section class="loading">
        <div class="indication"></div>
      </section>
    </div>

    <!-- MAIN CONTENT -->

    <main id="main-content">
      <section class="gallery">
        <ul></ul>
      </section>
    </main>
    <section class="gallery_open"></section>
    <footer>
      <a href="https://www.instagram.com/raphaellafkdart" target="_blank">
        <img
          width="25px"
          class="instagramIcon"
          alt="instagramIcon"
          src="img/instagram.svg"
        />
      </a>
      <p id="copyright">Raphaellafkdart, 2023</p>
      <a href="contact.html">
        <img
          width="28px"
          class="emailIcon"
          alt="emailIcon"
          src="img/envelope-regular.svg"
        />
      </a>
    </footer>
  </body>
</html>
