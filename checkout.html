<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="purchase page where clients go through the final purchase process."
    />
    <meta property="title" content="Checkout - Raphaella Fkd Art" />
    <meta name="author" content="JFKD" />
    <title>Checkout - Raphaella Fkd Art</title>
    <link rel="icon" href="img/raphaella-logo.JPEG" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/checkout.css" />
  </head>
  <body>
    <header>
      <h1>
        <img src="img/raphaella-logo.JPEG" alt="company logo" />
      </h1>
      <h2>Checkout</h2>
    </header>

    <main>
      <section id="summary">
        <div class="checkout-items">
          <figure>
            <img src="original-images/end-time-original.jpeg" alt="" />
            <ul>
              <li class="item-name">End Times</li>
              <li class="item-description">description, amount</li>
            </ul>
            <figcaption>
              <p class="price">ETB 5,000</p>
            </figcaption>
          </figure>
        </div>
        <article class="delivery">
          <h3>Pick up points</h3>
          <label for="point-1">
            <input type="radio" name="delivery" id="point-1" checked />
            <p>4 Kilo</p>
          </label>
          <label for="point-2">
            <input type="radio" name="delivery" id="point-2" />
            <p>Ayat Zone 3</p>
          </label>
        </article>
      </section>
      <form id="form">
        <label for="name">
          <span class="input-label">Full Name</span>
          <input type="text" id="name" name="name" autofocus="off" required />
        </label>
        <label for="email">
          <span class="input-label">Email Address</span>
          <input type="email" id="email" name="email" required />
        </label>
        <label for="phone-num">
          <span class="input-label">Phone Number</span>
          <div>
            <p>+251</p>
            <input type="tel" id="phone-num" name="phone-num" required />
          </div>
        </label>
        <article id="payment">
          <h3>Payment Information</h3>
          <div class="options">
            <label for="cbe">
              <input type="radio" name="payment" id="cbe" checked />
              <span class="input-label">CBE</span>
            </label>
            <label for="telebirr">
              <input type="radio" name="payment" id="cbe" />
              <span class="input-label">Telebirr</span>
            </label>
            <label for="Boa">
              <input type="radio" name="payment" id="boa" />
              <span class="input-label">BOA</span>
            </label>
          </div>
          <div class="payment-information">
            <h4>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="30p"
                height="30px"
                viewBox="0 0 24 24"
              >
                <path
                  fill="var(--BTNCOLOR)"
                  d="M11.5 1L2 6v2h19V6m-5 4v7h3v-7M2 22h19v-3H2m8-9v7h3v-7m-9 0v7h3v-7z"
                />
              </svg>
              Commercial Bank Of Ethiopia
            </h4>
            <article>
              <p>Name</p>
              <input
                type="text"
                disabled
                placeholder="RAFFAELA FEKADU TESFAYE"
              />
            </article>
            <article>
              <p>Account no.</p>
              <input type="text" disabled placeholder="1000116036138" />
            </article>
            <article>
              <p>Total Amount</p>
              <input type="text" disabled placeholder="5000" />
            </article>
          </div>
        </article>
        <p class="notice">
          * Order will be cancelled if payment is not made within 24 hours.
        </p>
        <div class="btns">
          <button type="button">Preview</button>
          <button type="submit">Checkout</button>
        </div>
      </form>
    </main>
  </body>
</html>
