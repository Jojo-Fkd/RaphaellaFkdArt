<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Shop page where artist's original artworks are displayed for sale"
    />
    <meta property="title" content="About - Raphaella Fkd Art" />
    <meta name="author" content="Millary Developments" />
    <title>Originals - Raphaella Fkd Art</title>
    <link rel="icon" href="img/raphaella-logo.JPEG" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/originals.css" />
    <script defer src="js/script.js"></script>
    <script defer src="js/footer.js"></script>
    <script defer src="js/shop.js"></script>
  </head>
  <body>
    <nav id="navigation">
      <h1 class="logo">
        <a href="index.html" aria-label="Link to home page"
          ><img width="90px" src="img/raphaella-logo.JPEG" alt="company_logo" />
          <img
            width="115px"
            src="img/raphaella-logo_extension.PNG"
            alt="logo extension"
          />
        </a>
      </h1>
      <ul class="nav-elements">
        <li>Shop</li>
        <li>
          <a href="index.html" aria-label="link to home page">Gallery</a>
        </li>
        <li>
          <a href="about.html" aria-label="link to about page">About</a>
        </li>
        <li>
          <a href="cart.html" aria-label="shopping cart link">Cart</a>
          <sub class="cart_amount"></sub>
        </li>
      </ul>
      <section id="main_nav_mobile">
        <a class="cart_icon" href="cart.html" aria-label="shopping cart link">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="1.5rem"
            viewBox="0 0 576 512"
          >
            <path
              d="M0 24C0 10.7 10.7 0 24 0H69.5c22 0 41.5 12.8 50.6 32h411c26.3 0 45.5 25 38.6 50.4l-41 152.3c-8.5 31.4-37 53.3-69.5 53.3H170.7l5.4 28.5c2.2 11.3 12.1 19.5 23.6 19.5H488c13.3 0 24 10.7 24 24s-10.7 24-24 24H199.7c-34.6 0-64.3-24.6-70.7-58.5L77.4 54.5c-.7-3.8-4-6.5-7.9-6.5H24C10.7 48 0 37.3 0 24zM128 464a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm336-48a48 48 0 1 1 0 96 48 48 0 1 1 0-96z"
            />
          </svg>
          <sub class="cart_amount"></sub>
        </a>
        <div class="side_bar_container">
          <div class="side_bar_icon_container">
            <div class="side_bar_icon"></div>
          </div>
          <div class="side_bar_close_container">
            <div class="side_bar_close"></div>
          </div>
        </div>
      </section>
      <ul class="side_bar_elements">
        <li>
          <a href="originals.html" aria-label="link to original arts shop"
            >Originals</a
          >
        </li>
        <li>
          <a href="prints.html" aria-label="link to print arts shop">Prints</a>
        </li>
        <li><a href="index.html" aria-label="link to home page">Gallery</a></li>
        <li>
          <a href="about.html" aria-label="link to about page">About</a>
        </li>
      </ul>
    </nav>
    <div class="popup_container">
      <section class="shopping-option_popup shop_popup">
        <button class="back_btn">Back</button>
        <header>
          <h3>Shop</h3>
          <div class="styler"></div>
        </header>
        <ul>
          <li>
            <a href="originals.html" aria-label="link to original arts shop"
              >Originals</a
            >
          </li>
          <li>
            <a href="prints.html" aria-label="link to print arts shop"
              >Prints</a
            >
          </li>
        </ul>
      </section>
      <section class="shopping-option_popup confirmation_popup">
        <header>
          <h3>Item Added</h3>
          <div class="styler"></div>
        </header>
        <ul>
          <li>
            <a href="originals.html" aria-label="link to original arts shop"
              >Continue Shopping</a
            >
          </li>
          <li>
            <a href="cart.html" aria-label="link to shopping cart"
              >Go To Cart</a
            >
          </li>
        </ul>
      </section>
    </div>
    <!-- ORIGINAL SHOP (ART DISPLAY) -->
    <main id="main-content">
      <header>
        <h2>Originals</h2>
      </header>
      <section id="original_shop"></section>
    </main>
    <!-- PROCEED PAGE (SECOND STEP OF PURCHASE) -->
    <section id="proceed_page">
      <div class="back_btn_container">
        <button class="back_btn">Back</button>
      </div>
    </section>
    <!-- PURCHASE PAGE (LAST STEP OF PURCHASE) -->
    <section id="purchase_page" class="final_page"></section>
    <section class="payment_page"></section>
    <footer></footer>
  </body>
</html>
